services:
  db:
    image: postgres:16
    container_name: saas_odonto_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-saas_odonto}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-saas_odonto}"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build: ./backend
    container_name: saas_odonto_api
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  pgdata:
